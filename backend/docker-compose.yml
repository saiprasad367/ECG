version: "3.8"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: cardiofpga_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./models:/app/models:ro   # read-only: model weights
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: cardiofpga_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q celery
    env_file: .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  # ── Celery Flower (task monitor) ─────────────────────────────────────────────
  flower:
    build: .
    container_name: cardiofpga_flower
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: cardiofpga_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cardiofpga_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # ── MinIO (object storage) ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cardiofpga_minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - backend

volumes:
  mongodb_data:
  minio_data:

networks:
  backend:
    driver: bridge
